required: true
format: "markdown"
fallback_format: "plaintext"
max_length: 2000
allow_multipart: true
schema:
  type: "object"
  properties:
    status:
      type: "string"
      enum: ["success", "error", "fallback"]
    content:
      type: "string"
    source:
      type: "array"
      items:
        type: "string"
    confidence:
      type: "number"
      minimum: 0
      maximum: 1
